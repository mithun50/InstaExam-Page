<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InstaExam – KCET, JEE &amp; NEET Updates</title>
<meta name="description" content="InstaExam delivers real-time KCET, JEE Main, NEET and COMEDK exam updates straight to your phone. Never miss a notification." />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --blue: #1E3A5F;
  --blue-light: #EEF2FF;
  --amber: #F59E0B;
  --text: #1C1917;
  --text-muted: #6b7280;
  --bg: #FAFAF9;
  --white: #ffffff;
  --radius: 20px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

.hero {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 24px 40px;
}

.hero-inner {
  max-width: 460px;
}

.app-icon {
  width: 96px;
  height: 96px;
  border-radius: var(--radius);
  overflow: hidden;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 28px;
  box-shadow: 0 8px 30px rgba(30, 58, 95, 0.3);
  padding: 12px;
  background: var(--white);
  box-sizing: border-box;
}

.app-name {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: 3px;
  color: var(--text);
  margin-bottom: 10px;
}

.tagline {
  font-size: 17px;
  color: var(--text-muted);
  font-weight: 400;
  margin-bottom: 16px;
}

.by-line {
  font-size: 12px;
  color: var(--amber);
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 44px;
  opacity: 0.9;
}

.store-badges {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  user-select: none;
}

.badge:active { transform: scale(0.97); }

.badge-play {
  background: var(--text);
  color: var(--white);
  cursor: pointer;
}
.badge-play:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.2); }

.badge-apple {
  background: var(--blue-light);
  color: var(--text-muted);
  cursor: default;
  position: relative;
}

.badge-icon {
  font-size: 22px;
  line-height: 1;
}

.badge-text-group {
  text-align: left;
  line-height: 1.3;
}

.badge-small {
  font-size: 10px;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: block;
}

.badge-store {
  font-size: 16px;
  font-weight: 700;
  display: block;
}

footer {
  text-align: center;
  padding: 24px;
  border-top: 1px solid #eef0f5;
}

.legal-links {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 12px;
}

.legal-links a {
  font-size: 13px;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.2s;
}
.legal-links a:hover { color: var(--blue); }

.copyright {
  font-size: 12px;
  color: #b0b5c0;
}

@media (max-width: 480px) {
  .hero { padding: 48px 20px 32px; }
  .app-icon { width: 80px; height: 80px; border-radius: 16px; margin-bottom: 24px; }
  .app-name { font-size: 28px; }
  .tagline { font-size: 15px; margin-bottom: 36px; }
  .store-badges { flex-direction: column; align-items: center; }
  .badge { width: 200px; justify-content: center; }
}
</style>
</head>
<body>

<section class="hero">
  <div class="hero-inner">
    <img class="app-icon" src="https://mithun50.github.io/InstaExam-Frontend/icons/Icon-192.png" alt="InstaExam" />
    <h1 class="app-name">InstaExam</h1>
    <p class="tagline">Real-time KCET, JEE &amp; NEET exam updates</p>
    <p class="by-line">BY HIKIFY</p>

    <div class="store-badges">
      <a href="https://play.google.com/store/apps/details?id=com.instaexam.app" target="_blank" rel="noopener" class="badge badge-play">
        <span class="badge-icon">&#9654;</span>
        <span class="badge-text-group">
          <span class="badge-small">Get it on</span>
          <span class="badge-store">Google Play</span>
        </span>
      </a>
      <span class="badge badge-apple">
        <span class="badge-icon">&#63743;</span>
        <span class="badge-text-group">
          <span class="badge-small">Coming soon on</span>
          <span class="badge-store">App Store</span>
        </span>
      </span>
    </div>
  </div>
</section>

<footer>
  <div class="legal-links">
    <a href="privacy-policy.html">Privacy Policy</a>
    <a href="terms-conditions.html">Terms &amp; Conditions</a>
    <a href="delete-account.html">Delete Account</a>
  </div>
  <p class="copyright">&copy; 2026 Hikify Digital Solutions. All rights reserved.</p>
</footer>

</body>
</html>
