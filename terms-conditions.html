<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Terms &amp; Conditions | InstaExam</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --blue: #1E3A5F;
  --blue-light: #EEF2FF;
  --text: #1C1917;
  --text-muted: #6b7280;
  --bg: #FAFAF9;
  --white: #ffffff;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

nav {
  padding: 16px 24px;
  border-bottom: 1px solid #eef0f5;
  display: flex;
  align-items: center;
  gap: 12px;
}

nav a.back {
  font-size: 13px;
  color: var(--blue);
  text-decoration: none;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
nav a.back:hover { text-decoration: underline; }

nav .nav-logo {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 4px;
  background: var(--white);
  box-sizing: border-box;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 48px 24px 60px;
  flex: 1;
}

h1 {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 6px;
}

.effective {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 36px;
}

h2 {
  font-size: 18px;
  font-weight: 700;
  margin-top: 36px;
  margin-bottom: 12px;
  color: var(--text);
}

p { margin: 10px 0; font-size: 15px; color: #374151; }
ul { margin: 8px 0 8px 20px; font-size: 15px; color: #374151; }
li { margin-bottom: 4px; }
a { color: var(--blue); }

hr {
  border: none;
  border-top: 1px solid #eef0f5;
  margin: 32px 0;
}

footer {
  text-align: center;
  padding: 24px;
  border-top: 1px solid #eef0f5;
}
.legal-links {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 12px;
}
.legal-links a {
  font-size: 13px;
  color: var(--text-muted);
  text-decoration: none;
}
.legal-links a:hover { color: var(--blue); }
.legal-links a.active { color: var(--blue); font-weight: 600; }
.copyright {
  font-size: 12px;
  color: #b0b5c0;
}

@media (max-width: 480px) {
  .container { padding: 32px 20px 48px; }
  h1 { font-size: 24px; }
}
</style>
</head>
<body>

<nav>
  <img class="nav-logo" src="https://mithun50.github.io/InstaExam-Frontend/icons/Icon-192.png" alt="InstaExam" />
  <a href="./" class="back">&larr; Home</a>
</nav>

<div class="container" id="content"></div>

<footer>
  <div class="legal-links">
    <a href="privacy-policy.html">Privacy Policy</a>
    <a href="terms-conditions.html" class="active">Terms &amp; Conditions</a>
  </div>
  <p class="copyright">&copy; 2026 Hikify Digital Solutions. All rights reserved.</p>
</footer>

<script>
const _params = new URLSearchParams(window.location.search);

if (_params.has('embedded')) {
  document.querySelector('nav').style.display = 'none';
  document.querySelector('footer').style.display = 'none';
}

(async function () {
  const SUPPORTED = ['en', 'hi', 'kn'];
  const lang = SUPPORTED.includes(_params.get('language')) ? _params.get('language') : 'en';
  const file = 'terms-conditions.' + lang + '.md';
  const container = document.getElementById('content');

  // Append inline-formatted text (bold + links) as DOM nodes — no innerHTML
  function appendInline(el, text) {
    const parts = text.split(/(\*\*[^*]+\*\*|\[[^\]]+\]\(https?:\/\/[^)]+\))/);
    parts.forEach(function(part) {
      if (!part) return;
      if (part.startsWith('**') && part.endsWith('**')) {
        const s = document.createElement('strong');
        s.textContent = part.slice(2, -2);
        el.appendChild(s);
      } else if (part.charAt(0) === '[') {
        const i1 = part.indexOf(']');
        const i2 = part.indexOf('(', i1);
        const i3 = part.lastIndexOf(')');
        if (i1 > 0 && i2 > i1 && i3 > i2) {
          const a = document.createElement('a');
          a.textContent = part.slice(1, i1);
          a.href = part.slice(i2 + 1, i3);
          a.target = '_blank';
          a.rel = 'noopener';
          el.appendChild(a);
        } else {
          el.appendChild(document.createTextNode(part));
        }
      } else {
        el.appendChild(document.createTextNode(part));
      }
    });
  }

  function renderMd(md) {
    const lines = md.split('\n');
    let ul = null;
    let firstH1 = true;

    function flush() { if (ul) { container.appendChild(ul); ul = null; } }

    function add(tag, text) {
      flush();
      const el = document.createElement(tag);
      if (text !== undefined) appendInline(el, text);
      container.appendChild(el);
      return el;
    }

    lines.forEach(function(line) {
      if      (line.startsWith('### ')) { add('h3', line.slice(4)); }
      else if (line.startsWith('## '))  { add('h2', line.slice(3)); }
      else if (line.startsWith('# '))   {
        const h = add('h1', line.slice(2));
        if (firstH1) { document.title = h.textContent + ' | InstaExam'; firstH1 = false; }
      }
      else if (line.startsWith('- '))   {
        if (!ul) ul = document.createElement('ul');
        const li = document.createElement('li');
        appendInline(li, line.slice(2));
        ul.appendChild(li);
      }
      else if (line.trim() === '---')   { flush(); container.appendChild(document.createElement('hr')); }
      else if (line.trim() === '')      { flush(); }
      else {
        const p = add('p', line);
        if (p.textContent.startsWith('**Effective')) p.classList.add('effective');
      }
    });
    flush();
  }

  try {
    const res = await fetch(file);
    if (!res.ok) throw new Error('not found');
    renderMd(await res.text());
  } catch (err) {
    const p = document.createElement('p');
    p.textContent = 'Content could not be loaded.';
    container.appendChild(p);
  }
})();
</script>
</body>
</html>
